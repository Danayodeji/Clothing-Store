<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <header class="header">

    <!-- info section -->

        <div class="info-head">
            <p>Summer Sale. up to 40% off.</p>
        </div>

    <!-- navbar section  -->

        <div class="nav-head">
            <div class="content-margin">
                <nav class="navbar">
                    <i class="fa-solid fa-magnifying-glass nav-gap"></i>
                    <div class="nav-category-drop nav-gap">
                        <a href="">Shop By Category</a>
                        <i class="fa-solid fa-chevron-down"></i>
                    </div>
                    <div class="nav-gap"><a href="">New Arrivals</a>
                    </div>
                    <div class="nav-gap"><a href="">Collections</a></div>
                </nav>
                <div class="logo-sections">
                    <img src="./image/site-logo.svg" alt="">
                </div>
                <div class="nav-sections">
                    <div class="social">
                        <i class="fa-brands fa-instagram"></i>
                        <i class="fa-brands fa-facebook"></i>
                        <i class="fa-brands fa-twitter"></i>
                        <i class="fa-brands fa-youtube"></i>
                    </div>
                    <div class="cart-section">
                        <span>$0.00</span>
                        <i class="fa-solid fa-cart-shopping"></i>
                        <p>0</p>
                    </div>
                    <div class="profile">
                        <i class="fa-solid fa-user"></i>
                    </div>
                </div>
            </div>
        </div>
    </header>
</body>

</html>
